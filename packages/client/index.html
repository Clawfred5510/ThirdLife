<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThirdLife</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Nunito = rounded friendly body. Fraunces = soft display-serif for headings. -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;900&family=Fraunces:opsz,wght@9..144,600;9..144,800&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Nunito', system-ui, sans-serif; }
      #game-canvas { width: 100%; height: 100%; touch-action: none; }
      #ui-root { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
      #ui-root > * { pointer-events: auto; }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div id="ui-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
